<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hub de Inteligência Comercial | Grupo Dom Bosco</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">GDB</div>
      <div>
        <strong>Hub de Inteligência</strong>
        <span>Comercial</span>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-note">
      <strong>Base de dados</strong>
      <span id="sourceStatus">Usando dados de exemplo</span>
    </div>
  </aside>

  <main class="app">
    <header class="topbar">
      <button class="menu-btn" id="toggleSidebar">☰</button>
      <div>
        <small>Grupo Dom Bosco</small>
        <h1 id="pageTitle">Hub de Inteligência Comercial</h1>
      </div>
      <div class="top-actions">
        <button class="ghost" id="refreshData">Atualizar dados</button>
        <a class="primary" id="powerBiMedicina" target="_blank" rel="noreferrer">Power BI Medicina</a>
      </div>
    </header>

    <section class="hero" id="pageIntro"></section>
    <section id="content"></section>
  </main>

  <template id="cardTemplate">
    <article class="metric-card">
      <div class="metric-head">
        <span class="metric-icon"></span>
        <span class="metric-source"></span>
      </div>
      <h3></h3>
      <strong></strong>
      <p></p>
    </article>
  </template>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
