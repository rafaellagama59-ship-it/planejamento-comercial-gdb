<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hub de Inteligência Comercial — Grupo Dom Bosco</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">GDB</div>
      <div>
        <strong>Hub de Inteligência</strong>
        <span>Comercial</span>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="side-note">Tudo editável na página. Use “Salvar alterações” para gravar neste navegador.</div>
  </aside>

  <main class="app">
    <header class="topbar">
      <div>
        <small>Grupo Dom Bosco</small>
        <h1 id="pageTitle">Visão Geral</h1>
        <p id="pageSubtitle">Indicadores principais e acompanhamento comercial.</p>
      </div>
      <div class="actions">
        <button class="btn ghost" id="exportBtn">Exportar backup</button>
        <label class="btn ghost file-label">Importar backup<input type="file" id="importFile" accept="application/json" hidden></label>
        <button class="btn primary" id="saveBtn">Salvar alterações</button>
      </div>
    </header>

    <section id="view"></section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
